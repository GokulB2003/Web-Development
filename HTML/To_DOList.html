<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            height: 400px;
            width: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #000;
            flex-direction: column;
        }
        #first
        {
            list-style: none;
            width: 100px;
            height:20px;
            text-align: center;
            padding:10px;
            border: 1px solid #000;
            
        }
        #ulol{

            height:300px;
            width:200px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #000;
        }
        .completed {
    text-decoration: line-through;
    color: rgb(114, 22, 22);
}
    </style>
</head>
<body style="height: 100vh; width: 100vw; display: flex; justify-content: center;">

    <div class="container">
        <h1>TO-Do-List</h1>
        <input type="text" id="input" value="">
        <br>
        <button id="btn" style="width:200px" >add Task</button>
        <br>
        <div id="ulol">
            <ul id="first">
        </ul>
        </div>
        
    </div>
    <script>
        let input=document.getElementById("input");
        let btn=document.getElementById("btn");
        let first=document.getElementById("first");
      
        btn.addEventListener('click',()=>{
            let val=input.value;
            if(val==="")return;

            let li=document.createElement("li");
            let checkbox=document.createElement("input");
            checkbox.type="checkbox";
            
            li.textContent=val;

      li.append(checkbox);
          checkbox.addEventListener('click',()=>{
             li.classList.toggle("completed");
          })
           
          let b=document.createElement("button");
          b.innerText="X";
          b.style.color="red";
          b.addEventListener('click',()=>{
            li.remove();
          })
        //   b.style.margin="10px";
          li.appendChild(b);
           first.appendChild(li);
           input.value="";

        })


    </script>
    
</body>
</html>
