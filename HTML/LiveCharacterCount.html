<!DOCTYPE html>
<html lang="en">

<!-- 12. Live Character Counter
 Description: Show characters typed in textarea.
 Description: Show popup on button click. -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container
        {
            display: flex;
            height: 100vh;
            width: 100vw;
            justify-content: center;
            align-items: center;


        }
        .form-data{
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            border: 1px solid #000;
            height: 400px;
            width:300px;
            align-items: center;

        }
        #count-char{
            border: 1px solid #000;
            padding:10px;
           
        }
        input{
            margin-top: 20px;
            padding: 10px;
            width: 80%;
        }
        .form-label{
            padding:10px ;
            font-size: 20px;
            font-weight: 10px;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="form-data">
            <label for="textinput" class="form-label">Character Count</label>
            <input type="text" id="textinput" placeholder="Enter the character" maxlength="100" value=" " class="form-label">
            <p id="count-char">0/100</p>
            <button id="display">display</button>
        </div>
    </div>
    <script src="/js/LiveCharacterCount.js"></script>
</body>
</html>
